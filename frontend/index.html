<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookLeaf Support</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <!-- Premium Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    brand: {
                        50: '#fff1f2',
                        100: '#ffe4e6',
                        200: '#fecdd3',
                        300: '#fda4af',
                        400: '#fb7185',
                        500: '#f43f5e',   /* Deep Pink / Red for BookLeaf */
                        600: '#e11d48',
                        700: '#be123c',
                        800: '#9f1239',
                        900: '#881337',
                    }
                },
                fontFamily: {
                    sans: ['Outfit', 'sans-serif'],
                },
            },
        },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; text-transform: none; letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr; }
    
    /* True Glassmorphism */
    .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.5); }
    /* Pitch Black Dark Mode Glass */
    .dark .glass-card { background: rgba(10, 10, 10, 0.85); border: 1px solid rgba(255, 255, 255, 0.08); }
    /* Extremely pitch black dark mode body */
    .dark body { background-color: #000000; }

    /* Premium Entry Animations */
    .msg-anim { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    
    /* Dynamic moving background gradients */
    .bg-shape1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; border-radius: 50%; background: radial-gradient(circle, rgba(244,63,94,0.12) 0%, rgba(255,255,255,0) 70%); filter: blur(60px); animation: float 20s infinite ease-in-out alternate; }
    .bg-shape2 { position: absolute; bottom: -10%; right: -10%; width: 60vw; height: 60vw; border-radius: 50%; background: radial-gradient(circle, rgba(253,164,175,0.12) 0%, rgba(255,255,255,0) 70%); filter: blur(60px); animation: float 25s infinite ease-in-out alternate-reverse; }
    
    .dark .bg-shape1 { background: radial-gradient(circle, rgba(225,29,72,0.15) 0%, rgba(0,0,0,0) 70%); }
    .dark .bg-shape2 { background: radial-gradient(circle, rgba(159,18,57,0.15) 0%, rgba(0,0,0,0) 70%); }

    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 5%) scale(1.1); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .typing-dot { width: 5px; height: 5px; border-radius: 50%; background-color: currentColor; animation: typingBounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; } .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.4;} 40% { transform: scale(1); opacity: 1;} }
  </style>
</head>
<body class="bg-slate-50 dark:bg-black text-slate-800 dark:text-slate-200 min-h-screen flex flex-col font-sans relative overflow-hidden transition-colors duration-500">
  
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden"><div class="bg-shape1"></div><div class="bg-shape2"></div></div>

  <main class="flex-grow flex items-center justify-center relative z-10 p-4 w-full h-screen">

    <!-- LOGIN LAYER -->
    <div id="auth-section" class="w-full max-w-md w-full transition-all duration-500 transform">
      <div class="glass-card rounded-[2rem] shadow-2xl shadow-brand-500/10 dark:shadow-brand-600/5 p-10 flex flex-col items-center text-center">
        
        <div class="mb-8">
          <div class="w-20 h-20 mx-auto rounded-[1.5rem] bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-xl shadow-brand-500/30 mb-6 hover:scale-105 transition-transform duration-300">
            <span class="material-symbols-outlined text-white text-4xl">auto_stories</span>
          </div>
          <h1 class="font-extrabold text-3xl tracking-tight text-slate-900 dark:text-white">BookLeaf <span class="text-brand-500">AI</span></h1>
          <p class="text-brand-600 dark:text-brand-400 font-bold text-[10px] uppercase tracking-[0.25em] mt-2 opacity-80">Author Portal</p>
        </div>
        
        <p class="text-slate-500 dark:text-slate-400 text-sm mb-8 leading-relaxed font-medium">Log in with your author email address to check on your publications and royalty status.</p>

        <form id="login-form" class="w-full space-y-5">
          <div class="relative group">
             <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-slate-400 dark:text-slate-500">mail</span>
            </div>
            <input id="email-input" type="email" placeholder="author@domain.com" required
              class="w-full h-14 pl-12 pr-5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 transition-all font-medium backdrop-blur-sm" />
          </div>
          <button type="submit" class="w-full h-14 bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 text-white font-bold text-[15px] rounded-2xl shadow-lg shadow-brand-500/25 transition-all flex items-center justify-center gap-2 active:scale-95">
            Continue to Chat
            <span class="material-symbols-outlined text-lg">arrow_right_alt</span>
          </button>
        </form>
      </div>
    </div>

    <!-- CHAT LAYER -->
    <div id="chat-container" class="hidden w-full max-w-[950px] h-full max-h-[85vh] glass-card rounded-[2.5rem] shadow-2xl flex overflow-hidden opacity-0 scale-95 transition-all duration-500">
      
      <!-- Side Navigation / Sidebar -->
      <div class="hidden md:flex flex-col w-[280px] border-r border-slate-200 dark:border-slate-800/80 bg-white/30 dark:bg-black/30 p-8">
        <div class="flex items-center gap-3 mb-10">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-md">
            <span class="material-symbols-outlined text-white text-xl">auto_stories</span>
          </div>
          <div>
            <h2 class="font-extrabold text-lg leading-tight text-slate-900 dark:text-white">BookLeaf</h2>
            <p class="text-[10px] text-brand-600 dark:text-brand-400 font-bold uppercase tracking-wider">AI Assistant</p>
          </div>
        </div>
        <div class="space-y-4 flex-grow">
          <div class="p-4 rounded-2xl bg-white/60 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800/80 shadow-sm backdrop-blur-md">
            <h3 class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Linked Account</h3>
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-brand-100 dark:bg-brand-900/50 text-brand-600 dark:text-brand-400 flex items-center justify-center">
                <span class="material-symbols-outlined text-[18px]">person</span>
              </div>
              <p id="user-display-email" class="text-sm font-semibold text-slate-700 dark:text-slate-200 truncate pr-2">author@test.com</p>
            </div>
          </div>
        </div>
        <div class="mt-auto pt-6">
          <button id="theme-toggle" class="flex items-center gap-3 px-4 py-4 w-full rounded-2xl hover:bg-white/50 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-400 font-semibold transition-all">
            <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            <span id="theme-text">Dark Mode</span>
          </button>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="flex-1 flex flex-col relative h-full bg-white/20 dark:bg-transparent">
        <header class="md:hidden flex justify-between items-center px-6 py-4 border-b border-slate-200 dark:border-slate-800/80 bg-white/40 dark:bg-black/40 backdrop-blur-xl z-20">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center"><span class="material-symbols-outlined text-white text-[16px]">auto_stories</span></div>
            <h1 class="font-extrabold text-lg text-slate-900 dark:text-white leading-none">BookLeaf AI</h1>
          </div>
          <button id="theme-toggle-mobile" class="w-10 h-10 flex items-center justify-center text-slate-600 dark:text-slate-400 rounded-full hover:bg-slate-200/50"><span class="material-symbols-outlined text-xl">dark_mode</span></button>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto px-6 py-8 md:px-10 md:py-10 space-y-6 no-scrollbar flex flex-col relative z-0"></div>

        <div id="typing-indicator" class="hidden px-6 md:px-10 pb-4 transition-opacity z-10 w-full animate-pulse">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-brand-100 dark:bg-brand-900/30 flex items-center justify-center border border-brand-200 dark:border-brand-800 shadow-sm"><span class="material-symbols-outlined text-[14px] text-brand-600 dark:text-brand-400">smart_toy</span></div>
            <div class="bg-white/80 dark:bg-slate-900/80 text-brand-500 px-4 py-3.5 rounded-2xl rounded-tl-sm border border-slate-200 dark:border-slate-800 shadow-sm backdrop-blur-md flex items-center w-fit"><div class="typing-dot mx-0.5"></div><div class="typing-dot mx-0.5"></div><div class="typing-dot mx-0.5"></div></div>
          </div>
        </div>

        <div class="px-6 pb-6 md:px-10 md:pb-8 pt-2 relative z-20">
          <form id="chat-form" class="relative group shadow-lg shadow-brand-500/5 rounded-[2rem]">
            <input type="text" id="message-input" placeholder="Ask about royalties, publishing status..." autocomplete="off" class="w-full h-[60px] pl-6 pr-16 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] focus:ring-2 focus:ring-brand-500 outline-none text-slate-900 dark:text-white transition-all font-medium text-[15px]" />
            <button type="submit" class="absolute right-2.5 top-2.5 bottom-2.5 w-10 bg-brand-500 hover:bg-brand-600 text-white rounded-full flex items-center justify-center transition-all shadow-md active:scale-95"><span class="material-symbols-outlined text-[20px] ml-[2px]">send</span></button>
          </form>
          <div class="mt-4 text-center hidden md:block"><p class="text-[10px] text-slate-400 dark:text-slate-600 font-bold tracking-[0.1em] uppercase">Powered by BookLeaf AI Data Architecture</p></div>
        </div>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
